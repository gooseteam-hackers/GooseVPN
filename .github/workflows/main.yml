name: Сборка конфигов

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mainflow:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Скачивание кода
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Установка зависимостей
        run: |
          pip install --upgrade pip
          pip install aiohttp maxminddb

      - name: Запуск парсера
        run: python goosevpn_parser.py --out ./configs
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: '1'

      - name: Валидация конфигов
        run: python check.py
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: '1'

      - name: Коммит изменений
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Autocommit: обновление конфигов"
          file_pattern: "configs/*.txt"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
