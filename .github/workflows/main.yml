name: Сборка

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser
        run: python main.py -o configs
        timeout-minutes: 300
        env:
          PYTHONUNBUFFERED: '1'

      - name: Validate
        run: python check.py
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Autocommit: configs update"
          file_pattern: "configs/*.txt"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
