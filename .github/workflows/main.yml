name: Сборка

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Запуск каждые 6 часов

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download GeoIP database
        run: |
          mkdir -p configs system
          curl -L -o configs/GeoLite2-Country.mmdb "https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb" || true

      - name: Run parser (skip funnel for speed)
        run: python main.py -o configs --skip-funnel --debug --cache-days 3
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: '1'

      - name: Validate
        run: python check.py
        timeout-minutes: 5
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check configs changed
        id: git_status
        run: |
          if git diff --quiet configs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit
        if: steps.git_status.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-update: configs $(date +'%Y-%m-%d %H:%M')"
          file_pattern: "configs/*.txt"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          skip_fetch: true
          skip_checkout: true

      - name: No update needed
        if: steps.git_status.outputs.changed == 'false'
        run: echo "Configs not changed, skipping commit"
